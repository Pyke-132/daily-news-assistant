dislikes:
  topics:
    - "Apple Music"
    - "celebrity"
    - "crypto"
    - "generic marketing"
    - "funding only"
    - "unrelated audio generation"
    - "weakly related voice translation"
    - "From data to decisions: how LSEG is scaling trusted AI"
  sources: []

source_boundary:
  enabled: true

  required_sections:
    - "[原文事实]"
    - "[模型总结]"
    - "[与用户相关]"

  rules:
    - "原文事实只能陈述原文明确表达的信息"
    - "模型总结允许归纳，但不得新增原文不存在的结论"
    - "与用户相关允许结合用户背景分析，但必须明确标注"
    - "禁止将模型推断写成原文事实"
    - "禁止将个人评价写成原文结论"

  quality_check:
    - "用户应能一眼区分事实与分析"
    - "出现推断时必须标注为分析或推测"

learning_preferences:
  - "遇到我不熟悉的概念，先补前置背景，再总结新闻"
  - "优先说明和 AgriAI、GIS、RAG、轻量部署、Python 工程的关系"
  - "不要泛泛说对 AI 行业有意义，要判断对我是否真有用"
  - "如果只是弱相关，要直接说弱相关，可以跳过"
  - "我更喜欢能落到项目、学习路线、工程实践的内容"
  - "链接打不开或正文不可读时，不要生成详细总结"

daily_feedback:
